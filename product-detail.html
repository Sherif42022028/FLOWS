<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المنتج — FLOW</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230A0A0A'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='18' fill='%23D4AF37'>F</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    /* مواءمة التصميم الخاص بالمنتج مع روح الموقع مع الحفاظ على الفخامة */
    body { background-color: #000; }
    
    /* Navbar Custom for Product Page - keeping Logo Left / Icons Right as requested */
    .product-nav {
      height: 70px;
      padding: 0 5%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--black-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0; width: 100%; z-index: 1000;
    }

    .prod-logo { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; color: #fff; order: 1; }
    .prod-links { display: flex; gap: 2rem; order: 2; list-style: none; }
    .prod-links a { font-size: 0.9rem; color: #ccc; transition: var(--transition); }
    .prod-links a:hover, .prod-links a.active { color: var(--gold-primary); }
    .prod-icons { display: flex; gap: 1.5rem; order: 3; }

    .product-single-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 120px 20px 80px;
    }

    .breadcrumb-row {
      margin-bottom: 40px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .breadcrumb-row a { color: var(--text-muted); transition: 0.2s; }
    .breadcrumb-row a:hover { color: var(--gold-primary); }
    .breadcrumb-row span { color: var(--gold-primary); margin: 0 10px; }

    .product-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 5rem;
      align-items: start;
    }

    /* Gallery */
    .gallery-area { position: sticky; top: 100px; }
    .main-view {
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 4/5;
      background: var(--black-card);
      border: 1px solid var(--black-border);
      margin-bottom: 20px;
    }
    .main-view img { width: 100%; height: 100%; object-fit: contain; background: #080808; transition: 0.5s ease; }
    
    .thumbnails { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
    .thumb-item {
      width: 80px; height: 100px; border-radius: 12px; overflow: hidden;
      cursor: pointer; border: 2px solid transparent; opacity: 0.5; transition: 0.3s;
      background: #111;
    }
    .thumb-item.active { border-color: var(--gold-primary); opacity: 1; }
    .thumb-item img { width: 100%; height: 100%; object-fit: contain; }

    /* Right Pane */
    .product-head h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; }
    .price-display { font-size: 2.5rem; font-weight: 700; color: var(--gold-primary); margin-bottom: 2rem; }
    .price-display span { font-size: 1rem; color: var(--text-secondary); margin-inline-start: 10px; }
    
    .prod-desc { color: var(--text-secondary); line-height: 1.8; margin-bottom: 2.5rem; font-size: 1rem; }

    .label-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gold-primary); margin-bottom: 12px; display: block; letter-spacing: 1px; }

    .swatch-group { display: flex; gap: 15px; margin-bottom: 2.5rem; }
    .swatch-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 3px solid #000;
      box-shadow: 0 0 0 1px var(--black-border); cursor: pointer; transition: 0.3s;
    }
    .swatch-btn.active { box-shadow: 0 0 0 2px var(--gold-primary); transform: scale(1.1); }

    .size-group { display: flex; gap: 10px; margin-bottom: 3rem; }
    .size-tile {
      flex: 1; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 10px; border: 1px solid var(--black-border); background: var(--black-card);
      font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;
    }
    .size-tile:hover { border-color: var(--gold-primary); }
    .size-tile.active { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); }

    .qty-buy-row { display: flex; gap: 20px; margin-bottom: 1.5rem; }
    .qty-input {
      display: flex; align-items: center; background: var(--black-card);
      border: 1px solid var(--black-border); border-radius: 12px; overflow: hidden;
    }
    .qty-input button {
      width: 45px; height: 55px; border: none; background: transparent; color: #fff; cursor: pointer;
    }
    .qty-input button:hover { background: var(--black-elevated); color: var(--gold-primary); }
    .qty-input span { width: 40px; text-align: center; font-weight: 700; font-family: 'Inter'; }

    .add-to-cart-big {
      flex: 1; height: 55px; background: var(--gold-primary); color: #000;
      border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
    }
    .add-to-cart-big:hover { background: var(--gold-light); transform: translateY(-3px); box-shadow: var(--shadow-gold-lg); }

    .whatsapp-contact {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      height: 55px; width: 100%; border: 1px solid #25D366; color: #25D366;
      border-radius: 12px; font-weight: 700; transition: 0.3s;
    }
    .whatsapp-contact:hover { background: #25D366; color: #000; }

    .trust-footer {
      margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--black-border);
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
    }
    .trust-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--text-muted); }
    .trust-item i { color: var(--gold-primary); }

    @media (max-width: 900px) {
      .product-grid { grid-template-columns: 1fr; gap: 3rem; }
      .gallery-area { position: static; }
      .product-head h1 { font-size: 2.2rem; }
      .prod-links { display: none; }
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav class="product-nav">
    <a href="index.html" class="prod-logo">FLOW</a>
    <ul class="prod-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="shop.html" class="active">المتجر</a></li>
      <li><a href="custom-tshirt.html">تيشيرت مخصص</a></li>
      <li><a href="downloads.html">تنزيل الفاتورة</a></li>
    </ul>
    <div class="prod-icons">
      <button class="nav-icon-btn" onclick="openAuthModal()"><i class="fa-regular fa-user"></i></button>
      <button class="nav-icon-btn" onclick="openCart()"><i class="fa-solid fa-shopping-bag"></i> <span class="cart-count" id="cart-count">0</span></button>
    </div>
  </nav>

  <main class="product-single-container" id="main-content">
    <!-- Content Generated Dynamically -->
  </main>

  <!-- ══ CART DRAWER ═══════════════════════════════════════════ -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header"><h3>🛒 سلة التسوق</h3><button class="nav-icon-btn" onclick="closeCart()"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="cart-drawer-body" id="cart-items"></div>
    <div class="cart-drawer-footer" id="cart-footer" style="display:none">
      <div style="display:flex;justify-content:space-between"><span>الإجمالي</span><span id="cart-total">0 ج</span></div>
      <a href="checkout.html" class="btn btn-gold" style="width:100%;justify-content:center;margin-top:1rem">إتمام الطلب ←</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="main.js"></script>

  <script>
    let p = null;
    let currentImgIdx = 0; // Index for Color
    let currentSubIdx = 0; // Index for Photo within color
    let quantity = 1;
    let selectedSize = '';
    let autoRotateTimer = null;

    function initProduct() {
      const id = +(new URLSearchParams(location.search).get('id') || 1);
      p = PRODUCTS_DATA.find(x => x.id === id) || PRODUCTS_DATA[0];
      selectedSize = p.sizes[1] || p.sizes[0];
      render();
      startAutoRotate();
    }

    function render() {
      const container = document.getElementById('main-content');
      const currentColor = p.colors[currentImgIdx];
      const images = currentColor.images || [currentColor.image];

      container.innerHTML = `
        <div class="breadcrumb-row">
          <a href="index.html">الرئيسية</a> <span>/</span> 
          <a href="shop.html">المتجر</a> <span>/</span> 
          <strong style="color:#fff">${p.name}</strong>
        </div>

        <div class="product-grid">
          <div class="gallery-area">
            <div class="main-view">
              <img id="main-img" src="${images[currentSubIdx]}" alt="${p.name}" onerror="this.src='https://dummyimage.com/600x800/111/D4AF37&text=${encodeURIComponent(p.name)}'">
            </div>
            <div class="thumbnails" style="display:flex; gap:10px; overflow-x:auto; padding:5px 0">
              ${images.map((img, i) => `
                <div class="thumb-item ${i === currentSubIdx ? 'active' : ''}" style="width:100px; height:120px; flex-shrink:0" onclick="setSubIdx(${i})">
                  <img src="${img}" style="width:100%; height:100%; object-fit:cover" onerror="this.src='https://dummyimage.com/100x120/111/eee&text=VIEW'">
                </div>
              `).join('')}
            </div>
          </div>

          <div class="product-pane">
            <div class="product-head">
              <h1 class="gradient-text">${p.name}</h1>
              <div class="price-display">${p.price} <span>جنية مصري</span></div>
              <p class="prod-desc">${p.desc}</p>
            </div>

            <span class="label-title">اللون المختار: <span style="color:#fff">${currentColor.name}</span></span>
            <div class="swatch-group">
              ${p.colors.map((c, i) => `
                <div class="swatch-btn ${i === currentImgIdx ? 'active' : ''}" 
                     style="background:${c.code || c.val}" 
                     onclick="setColorIdx(${i})"
                     title="${c.name}"></div>
              `).join('')}
            </div>

            <span class="label-title">المقاس</span>
            <div class="size-group">
              ${p.sizes.map(s => `
                <div class="size-tile ${s === selectedSize ? 'active' : ''}" onclick="setSize('${s}')">${s}</div>
              `).join('')}
            </div>

            <div class="qty-buy-row">
              <div class="qty-input">
                <button onclick="changeQty(-1)">−</button>
                <span id="qty-val">${quantity}</span>
                <button onclick="changeQty(1)">+</button>
              </div>
              <button class="add-to-cart-big" onclick="addToCartNow()">🛒 أضف للسلة</button>
            </div>

            <a href="https://wa.me/201035269808?text=مرحباً، أريد طلب ${p.name} لون ${currentColor.name} مقاس ${selectedSize}" target="_blank" class="whatsapp-contact">
              <i class="fab fa-whatsapp"></i> اطلب عبر واتساب
            </a>

            <div class="trust-footer">
              <div class="trust-item"><i class="fa-solid fa-truck-fast"></i> توصيل سريع خلال 48 ساعة</div>
              <div class="trust-item"><i class="fa-solid fa-shield-check"></i> خامات قطنية بريميوم</div>
              <div class="trust-item"><i class="fa-solid fa-rotate"></i> إرجاع مجاني خلال 14 يوم</div>
              <div class="trust-item"><i class="fa-solid fa-credit-card"></i> الدفع عند الاستلام</div>
            </div>
          </div>
        </div>
      `;
    }

    function startAutoRotate() {
      if (autoRotateTimer) clearInterval(autoRotateTimer);
      autoRotateTimer = setInterval(() => {
        const currentColor = p.colors[currentImgIdx];
        const images = currentColor.images || [currentColor.image];
        if (images.length > 1) {
          currentSubIdx = (currentSubIdx + 1) % images.length;
          updateGallery();
        }
      }, 3500);
    }

    function updateGallery() {
      const currentColor = p.colors[currentImgIdx];
      const images = currentColor.images || [currentColor.image];
      const mainImg = document.getElementById('main-img');
      if (mainImg) {
        mainImg.style.opacity = '0.5';
        setTimeout(() => {
          mainImg.src = images[currentSubIdx];
          mainImg.style.opacity = '1';
        }, 300);
      }
      document.querySelectorAll('.thumb-item').forEach((t, i) => {
        t.classList.toggle('active', i === currentSubIdx);
      });
    }

    function setColorIdx(i) {
      currentImgIdx = i;
      currentSubIdx = 0;
      render();
      startAutoRotate();
    }

    function setSubIdx(i) {
      currentSubIdx = i;
      updateGallery();
      startAutoRotate();
    }

    function setSize(s) {
      selectedSize = s;
      render();
    }

    function changeQty(d) {
      quantity = Math.max(1, quantity + d);
      document.getElementById('qty-val').innerText = quantity;
    }

    function addToCartNow() {
      if (typeof cartService !== 'undefined') {
        cartService.addItem(p, selectedSize, quantity, p.colors[currentImgIdx].name);
        UIController.updateAll();
        UIController.showToast('✅ تمت الإضافة للسلة');
        openCart();
      }
    }

    window.onload = initProduct;
  </script>
</body>
</html>
